<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aman Dhaliwal</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"
  }
}
</script>
</head>
<body>

<canvas id="smoke"></canvas>
<audio id="audio" src="asong.mp3" preload="auto"></audio>

<div id="funBg">
  <video id="funVideo" muted loop playsinline>
    <source src="akatsuki.mp4" type="video/mp4">
  </video>
</div>

<div id="proBg"></div>
<canvas id="threeCanvas"></canvas>

<div class="content">
  <h1 class="name">Aman Dhaliwal</h1>
  <p class="subtitle">Computing Science • Software Developer</p>
  <div class="buttons">
    <div class="btn proBtn">Professional</div>
    <div class="btn funBtn">Fun</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';

/* =====================
   SMOKE
===================== */
const smokeCanvas = document.getElementById("smoke");
const ctx = smokeCanvas.getContext("2d");
smokeCanvas.width = innerWidth;
smokeCanvas.height = innerHeight;

class P {
  constructor(){ this.reset(); }
  reset(){
    this.x  = Math.random() * innerWidth;
    this.y  = Math.random() * innerHeight;
    this.s  = Math.random() * 120 + 60;
    this.vy = -(Math.random() * 0.3 + 0.1);
    this.o  = 0;
  }
  update(){
    this.y += this.vy;
    this.o += 0.002;
    if(this.y < 0) this.reset();
  }
  draw(){
    const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.s);
    g.addColorStop(0, `rgba(200,200,200,${this.o})`);
    g.addColorStop(1, "transparent");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.s, 0, Math.PI*2);
    ctx.fill();
  }
}

const pts = Array.from({length: 30}, () => new P());
function smokeLoop(){
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  pts.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(smokeLoop);
}
smokeLoop();

/* =====================
   THREE.JS CUBE
===================== */
const threeCanvas = document.getElementById("threeCanvas");
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.2, 1.2, 1.2));
const cube  = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x33ccff }));
scene.add(cube);
cube.rotation.x = 0.6;
cube.rotation.y = 0.6;

(function cubeLoop(){
  requestAnimationFrame(cubeLoop);
  cube.rotation.x += 0.006;
  cube.rotation.y += 0.010;
  renderer.render(scene, camera);
})();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  smokeCanvas.width  = innerWidth;
  smokeCanvas.height = innerHeight;
});

/* =====================
   AUDIO
===================== */
const audio = document.getElementById("audio");
let audioState = null;

// Unlock audio on first mousedown (before click, so hover audio works immediately)
document.addEventListener("mousedown", function unlock() {
  audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(()=>{});
  document.removeEventListener("mousedown", unlock);
}, { once: true });
function playAudio(type){
  if(audioState === type) return;
  audioState = type;
  audio.volume = 0.25;
  audio.currentTime = 0;
  audio.play().catch(()=>{});
}
function stopAudio(type){
  if(audioState !== type) return;
  audio.pause();
  audio.currentTime = 0;
  audioState = null;
}

/* =====================
   FUN BUTTON
===================== */
const funBg    = document.getElementById("funBg");
const funVideo = document.getElementById("funVideo");
const funBtn   = document.querySelector(".funBtn");
funBtn.addEventListener("mouseenter", () => {
  funBg.style.opacity = "1";
  funVideo.play();
  funBtn.classList.add("redGlow");
  playAudio("fun");
});
funBtn.addEventListener("mouseleave", () => {
  funBg.style.opacity = "0";
  funVideo.pause();
  funBtn.classList.remove("redGlow");
  stopAudio("fun");
});
funBtn.addEventListener("click", () => window.location.href = "/fun/");

/* =====================
   PRO BUTTON
===================== */
const proBg  = document.getElementById("proBg");
const proBtn = document.querySelector(".proBtn");
proBtn.addEventListener("mouseenter", () => {
  proBg.style.opacity       = "1";
  threeCanvas.style.opacity = "1";
  proBtn.classList.add("blueActive");
});
proBtn.addEventListener("mouseleave", () => {
  proBg.style.opacity       = "0";
  threeCanvas.style.opacity = "0";
  proBtn.classList.remove("blueActive");
});
proBtn.addEventListener("click", () => window.location.href = "/professional/");
</script>

</body>
</html>
